name: 🌎 Forex Market Bot

on:
  schedule:
    # ২০ মিনিট পর পর চলবে (UTC সময়ে) Gold বটের সাথে সংঘর্ষ এড়াতে
    # 00:20, 04:20, 08:20, 12:20, 16:20, 20:20 UTC
    # সোম থেকে শুক্র (1-5)
    - cron: '20 */4 * * 1-5'
  
  workflow_dispatch:

jobs:
  forex-analysis:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 📊 Run Forex Analysis
        env:
          FOREX_TELEGRAM_BOT_TOKEN: ${{ secrets.FOREX_TELEGRAM_BOT_TOKEN }}
          FOREX_TELEGRAM_CHAT_ID: ${{ secrets.FOREX_TELEGRAM_CHAT_ID }}
        run: python analysis/forex_bot.py

      - name: ✅ Done
        run: echo "Forex analysis sent to Telegram successfully!"
